<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-cloud-sun"></i> Weather Dashboard</h1>
            <div class="search-box">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Search city..."
                    autocomplete="off"
                >
                <button id="searchBtn"><i class="fas fa-search"></i></button>
                <button id="geoBtn" title="Use my location"><i class="fas fa-map-marker-alt"></i></button>
            </div>
        </header>

        <main>
            <!-- Current Weather -->
            <section id="currentWeather" class="current-weather">
                <div class="loading" id="loading"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
                <div id="weatherContent" style="display: none;">
                    <div class="weather-header">
                        <h2 id="cityName"></h2>
                        <p id="date"></p>
                    </div>
                    <div class="weather-main">
                        <div class="temperature-section">
                            <img id="weatherIcon" src="" alt="Weather icon">
                            <div class="temp-info">
                                <span id="temperature" class="temperature"></span>
                                <p id="description"></p>
                            </div>
                        </div>
                    </div>
                    <div class="weather-details">
                        <div class="detail-item">
                            <i class="fas fa-droplet"></i>
                            <span>Humidity: <strong id="humidity"></strong></span>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-wind"></i>
                            <span>Wind: <strong id="windSpeed"></strong></span>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-eye"></i>
                            <span>Visibility: <strong id="visibility"></strong></span>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-compress"></i>
                            <span>Pressure: <strong id="pressure"></strong></span>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-arrow-up"></i>
                            <span>Feels Like: <strong id="feelsLike"></strong></span>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-eye-slash"></i>
                            <span>UV Index: <strong id="uvIndex"></strong></span>
                        </div>
                    </div>
                </div>
                <div id="errorMessage" class="error-message" style="display: none;"></div>
            </section>

            <!-- 5-Day Forecast -->
            <section id="forecastSection" class="forecast-section" style="display: none;">
                <h2>5-Day Forecast</h2>
                <div id="forecast" class="forecast-container"></div>
            </section>

            <!-- Saved Cities -->
            <section id="savedCities" class="saved-cities" style="display: none;">
                <h2>Saved Cities</h2>
                <div id="citiesList" class="cities-list"></div>
            </section>
        </main>

        <footer>
            <p>Weather data powered by <a href="https://openweathermap.org" target="_blank">OpenWeatherMap API</a></p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
